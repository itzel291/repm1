<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centinela - Recuperar Contraseña</title>
    <script src="js/session-bridge.js"></script>
    <script src="js/ui-preferences.js"></script>
    <link rel="stylesheet" href="css/ui-shell.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <!-- Botón de regresar -->
            <div style="margin-bottom: 1.5rem;">
                <a href="login.html" class="btn-link">← Regresar</a>
            </div>

            <!-- Logo -->
            <div class="logo-container">
                <div style="font-size: 80px;">
                <img src="assets/im2.jpeg" style="width: 130px; height: 130px; border-radius: 100px;">

                </div>
                <h1 class="logo-title">Recuperar contraseña</h1>
                <p class="logo-subtitle">Ingresa tu correo electrónico para recibir un enlace de recuperación</p>
            </div>

            <!-- Formulario de recuperación -->
            <form id="recuperarForm">
                <div class="form-group">
                    <label for="email">Correo electrónico*</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="ejemplo@email.com" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" id="btnRecuperar">
                    Enviar enlace
                </button>
            </form>

            <div id="mensaje" class="mensaje"></div>


            <div class="footer-link">
                <p>¿No tienes acceso a tu correo? <a href="#">Contactar soporte</a></p>
            </div>
        </div>
    </div>

    <script src="js/recuperar.js"></script>
</body>
</html>
