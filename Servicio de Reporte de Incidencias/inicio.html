<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Centinela - Inicio</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined|Material+Icons+Round" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FACC15",
                        "background-light": "#F1F5F9",
                        "background-dark": "#0F172A",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1E293B",
                        "sidebar-dark": "#020617",
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="Interfaz.css">
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 h-screen overflow-hidden flex font-sans transition-colors duration-200">

    <aside class="w-64 bg-sidebar-dark text-white flex flex-col justify-between hidden md:flex shrink-0 border-r border-slate-800">
        <div>
            <div class="h-20 flex items-center px-6 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <span class="material-icons-round text-primary text-4xl">local_police</span>
                    <span class="font-bold text-2xl tracking-wide text-white">Centinela</span>
                </div>
            </div>
            <nav class="mt-8 px-4 space-y-2">
                <a class="flex items-center gap-4 px-4 py-3 bg-primary/10 text-primary rounded-xl font-medium" href="inicio.html">
                    <span class="material-icons-round">home</span> Resumen
                </a>
                <a class="flex items-center gap-4 px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-colors font-medium" href="Interfaz.html">
                    <span class="material-icons-round">campaign</span> Panel de Control
                </a>
            </nav>
        </div>
        
        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center gap-3 text-slate-400">
                <div id="displayInicialUser" class="w-10 h-10 rounded-full bg-slate-600 flex items-center justify-center text-white font-bold text-lg">?</div>
                <div class="flex flex-col">
                    <span id="displayNombreUser" class="text-sm font-semibold text-white">Cargando...</span>
                    <span id="displayRolUser" class="text-xs text-slate-500">...</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-20 bg-surface-light dark:bg-surface-dark border-b border-slate-200 dark:border-slate-700 flex items-center justify-between px-8 shrink-0 z-20">
            <h1 class="text-xl font-bold dark:text-white">Inicio</h1>
            <button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" id="theme-toggle">
                <span class="material-icons-round text-2xl">contrast</span>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8">
            
            <div class="flex flex-wrap gap-6 items-start">
                
                <div class="w-full max-w-sm bg-surface-light dark:bg-surface-dark rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden flex flex-col h-[32rem]">
                    <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                        <h3 class="font-bold text-slate-800 dark:text-white flex items-center gap-2">
                            <span class="material-icons-round text-red-500 text-lg">notifications_active</span> 
                            Últimos Reportes
                        </h3>
                        <a href="Interfaz.html" class="text-xs text-blue-600 dark:text-blue-400 hover:underline font-medium">Ver todo</a>
                    </div>
                    
                    <div id="widget-incidencias" class="flex-1 overflow-y-auto p-2">
                        <p class="text-slate-500 text-center py-4 text-sm">Cargando incidencias...</p>
                    </div>
                </div>

                <div class="flex-1 min-w-[300px] h-[32rem] border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-400 dark:text-slate-500">
                    <span class="material-icons-round text-4xl mb-2">dashboard_customize</span>
                    <p class="text-sm font-medium">Espacio para futuros módulos o estadísticas...</p>
                </div>

            </div>
        </div>
    </main>

    <script>
        const API_URL = "http://127.0.0.1:5000/api";
        const usuarioActual = localStorage.getItem('usuarioActual');
        const rolActual = localStorage.getItem('rolActual');

        // Validar sesión
        if (!usuarioActual) window.location.href = 'login.html';

        // Llenar datos visuales del usuario
        document.getElementById('displayNombreUser').innerText = usuarioActual;
        document.getElementById('displayRolUser').innerText = rolActual === 'admin' ? 'Administrador' : 'Oficial de Seguridad';
        document.getElementById('displayInicialUser').innerText = usuarioActual.charAt(0).toUpperCase();

        // Modo Oscuro
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // ==========================================
        // FUNCIÓN PARA OBTENER EL NOMBRE DE LA CALLE (REVERSE GEOCODING)
        // ==========================================
        async function obtenerNombreCalle(lat, lon, idElemento) {
            try {
                // Hacemos una petición rápida a OpenStreetMap
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();
                
                // Extraemos el nombre de la calle, o si no hay, la colonia/ciudad
                const calle = data?.address?.road || data?.address?.neighbourhood || data?.address?.suburb || "Ubicación detectada";
                
                // Actualizamos el texto en el widget
                document.getElementById(`calle-${idElemento}`).innerText = `📍 ${calle}`;
            } catch (error) {
                document.getElementById(`calle-${idElemento}`).innerText = `📍 Ver coordenadas`;
            }
        }

        // ==========================================
        // LÓGICA DEL WIDGET DE INCIDENCIAS
        // ==========================================
        async function cargarWidget() {
            try {
                const response = await fetch(`${API_URL}/consultar_incidencias?rol=${rolActual}`);
                const strXml = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(strXml, "text/xml");
                const incidencias = xmlDoc.getElementsByTagName("incidencia");

                const contenedor = document.getElementById("widget-incidencias");
                contenedor.innerHTML = "";

                let activasCount = 0;

                for (let i = 0; i < incidencias.length; i++) {
                    const estado = incidencias[i].getElementsByTagName("estado")[0]?.textContent || "Abierto";
                    
                    if (estado === 'Eliminado') continue;

                    activasCount++;
                    if (activasCount > 10) continue; // Solo mostrar 10 en el widget

                    const id = incidencias[i].getElementsByTagName("id")[0].textContent;
                    const desc = incidencias[i].getElementsByTagName("descripcion")[0].textContent;
                    const fecha = incidencias[i].getElementsByTagName("fecha")[0].textContent;
                    const user = incidencias[i].getElementsByTagName("usuario")[0].textContent;
                    
                    // Extraer coordenadas
                    const lat = incidencias[i].getElementsByTagName("latitud")[0]?.textContent || "";
                    const lon = incidencias[i].getElementsByTagName("longitud")[0]?.textContent || "";

                    const item = `
                        <div class="flex items-start gap-3 p-3 hover:bg-slate-100 dark:hover:bg-slate-800/80 rounded-xl transition-colors border-b border-slate-100 dark:border-slate-800/50 last:border-0 cursor-pointer" onclick="window.location.href='Interfaz.html'">
                            <div class="mt-1 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-full p-2 flex items-center justify-center shrink-0">
                                <span class="material-icons-round text-sm">campaign</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-center mb-0.5">
                                    <p class="text-sm font-bold text-slate-800 dark:text-white truncate">Alerta #${id}</p>
                                    <span class="text-[10px] font-medium text-slate-400 shrink-0 ml-2">${fecha}</span>
                                </div>
                                <p class="text-xs text-slate-600 dark:text-slate-300 truncate mb-1.5">${desc}</p>
                                <div class="flex justify-between items-center">
                                    <p class="text-[10px] text-slate-400 font-medium">Por: ${user}</p>
                                    <p class="text-[10px] text-blue-500 font-medium truncate ml-2 text-right w-1/2" id="calle-${id}">
                                        ${lat && lon ? 'Buscando calle...' : 'Sin ubicación'}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `;
                    contenedor.innerHTML += item;

                    // Si tiene coordenadas, disparamos la búsqueda de la calle asíncronamente
                    if (lat && lon) {
                        obtenerNombreCalle(lat, lon, id);
                    }
                }

                if (activasCount === 0) {
                    contenedor.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400"><span class="material-icons-round text-4xl mb-2 opacity-50">check_circle</span><p class="text-sm">Todo tranquilo. No hay incidencias activas.</p></div>`;
                }

            } catch (error) {
                console.error("Error al cargar widget:", error);
                document.getElementById("widget-incidencias").innerHTML = `<p class="text-red-500 text-sm p-4">Error conectando con el servidor.</p>`;
            }
        }

        document.addEventListener("DOMContentLoaded", cargarWidget);
    </script>
</body>
</html>
